name: SwiftPay CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: swiftpay_test
          POSTGRES_USER: swiftpay
          POSTGRES_PASSWORD: swiftpay
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and test gateway-service
        working-directory: gateway-service
        run: mvn verify -B
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/swiftpay_test
          SPRING_DATASOURCE_USERNAME: swiftpay
          SPRING_DATASOURCE_PASSWORD: swiftpay

      - name: Build and test ledger-service
        working-directory: ledger-service
        run: mvn verify -B
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/swiftpay_test
          SPRING_DATASOURCE_USERNAME: swiftpay
          SPRING_DATASOURCE_PASSWORD: swiftpay

      - name: Build Docker image — gateway
        run: docker build -t swiftpay-gateway:${{ github.sha }} ./gateway-service

      - name: Build Docker image — ledger
        run: docker build -t swiftpay-ledger:${{ github.sha }} ./ledger-service

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            gateway-service/target/surefire-reports/
            ledger-service/target/surefire-reports/
