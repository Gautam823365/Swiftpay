server:
  port: 8080

spring:
  application:
    name: gateway-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:swiftpay}
    username: ${DB_USER:swiftpay}
    password: ${DB_PASS:swiftpay123}
    hikari:
      maximum-pool-size: 50
      minimum-idle: 10
      connection-timeout: 10000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration


  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}

    producer:

      acks: all
      retries: 3
      linger-ms: 20
      batch-size: 131072
      buffer-memory: 33554432
      compression-type: snappy
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

    properties:
      spring.json.trusted.packages: "com.swiftpay.*"
      spring.json.use.type.headers: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

swiftpay:
  kafka:
    topics:
      payment-initiated: payment.initiated

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level [txnId=%X{transactionId}] %logger{36} - %msg%n"
  level:
    com.swiftpay: DEBUG
    org.springframework.kafka: INFO
