server:
  port: 8081

spring:
  application:
    name: ledger-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:swiftpay}
    username: ${DB_USER:swiftpay}
    password: ${DB_PASS:swiftpay123}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}

    consumer:
      group-id: ledger-service-group
      auto-offset-reset: earliest

      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer

      properties:
        spring.kafka.consumer.value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
        spring.json.trusted.packages: "com.swiftpay.*"
        spring.json.use.type.headers: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

swiftpay:
  kafka:
    topics:
      payment-initiated: payment.initiated
      payment-completed: payment.completed
      payment-failed: payment.failed

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level [txnId=%X{transactionId}] %logger{36} - %msg%n"

  level:
    com.swiftpay: DEBUG
    org.springframework.kafka: INFO